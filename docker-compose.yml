services:
  postgres:
    image: postgres:16-alpine
    container_name: ponto_digital_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ponto
      POSTGRES_PASSWORD: ponto
      POSTGRES_DB: ponto_digital
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ponto -d ponto_digital']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: ponto_digital_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ponto:ponto@postgres:5432/ponto_digital?schema=public
      NODE_ENV: production
      PORT: '3050'
      ORIGIN: http://localhost:3050
    ports:
      - '3050:3050'

volumes:
  postgres_data:
